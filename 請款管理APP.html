<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請款管理系統</title>
<style>
  :root {
    --ink: #1a1f2e;
    --ink2: #3d4460;
    --muted: #8a92a8;
    --border: #e2e6f0;
    --bg: #f5f7fb;
    --card: #ffffff;
    --accent: #2563eb;
    --accent2: #1d4ed8;
    --green: #059669;
    --orange: #d97706;
    --red: #dc2626;
    --tag-a: #dbeafe; --tag-at: #1d4ed8;
    --tag-b: #dcfce7; --tag-bt: #15803d;
    --tag-c: #fef3c7; --tag-ct: #92400e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Arial, sans-serif; background: var(--bg); color: var(--ink); font-size: 14px; }

  /* Header */
  .header { background: var(--ink); color: #fff; padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
  .header-icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .header h1 { font-size: 16px; font-weight: 700; letter-spacing: .5px; }
  .header-sub { font-size: 11px; color: #8a9bb8; margin-top: 2px; }

  /* Summary cards */
  .summary { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; padding: 16px; }
  @media(max-width:700px){ .summary { grid-template-columns: repeat(2,1fr); } }
  .card { background: var(--card); border-radius: 12px; padding: 14px 16px; border: 1px solid var(--border); }
  .card-label { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
  .card-value { font-size: 22px; font-weight: 800; color: var(--ink); margin-top: 4px; line-height: 1; }
  .card-value.accent { color: var(--accent); }
  .card-value.green { color: var(--green); }
  .card-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Tabs */
  .tabs { display: flex; gap: 4px; padding: 0 16px 12px; border-bottom: 1px solid var(--border); overflow-x: auto; }
  .tab { padding: 7px 16px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; border: 1.5px solid transparent; white-space: nowrap; transition: all .15s; }
  .tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .tab:not(.active) { color: var(--ink2); border-color: var(--border); background: var(--card); }
  .tab:not(.active):hover { border-color: var(--accent); color: var(--accent); }

  /* Filters */
  .filters { display: flex; gap: 8px; padding: 12px 16px; flex-wrap: wrap; align-items: center; }
  .filter-select, .filter-input { padding: 7px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: 13px; background: var(--card); color: var(--ink); outline: none; }
  .filter-select:focus, .filter-input:focus { border-color: var(--accent); }
  .filter-input { flex: 1; min-width: 160px; }
  .filter-label { font-size: 12px; color: var(--muted); font-weight: 600; }
  .result-count { font-size: 12px; color: var(--muted); margin-left: auto; }

  /* Table */
  .table-wrap { overflow-x: auto; padding: 0 16px 16px; }
  table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 1px 3px rgba(0,0,0,.06); }
  th { background: #f0f3fa; color: var(--ink2); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; white-space: nowrap; }
  th:hover { color: var(--accent); }
  th .sort-icon { margin-left: 4px; opacity: .4; }
  th.sorted .sort-icon { opacity: 1; color: var(--accent); }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f8faff; }
  .col-month { white-space: nowrap; font-weight: 600; color: var(--ink2); }
  .col-vendor { font-weight: 600; max-width: 140px; }
  .col-location { font-size: 12px; color: var(--ink2); max-width: 200px; line-height: 1.5; }
  .col-amount { font-weight: 700; text-align: right; white-space: nowrap; }
  .col-invoice { font-size: 11px; color: var(--muted); font-family: monospace; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 5px; font-size: 11px; font-weight: 700; }
  .tag-信帆 { background: var(--tag-a); color: var(--tag-at); }
  .tag-元上億 { background: var(--tag-b); color: var(--tag-bt); }
  .tag-優美佳 { background: var(--tag-c); color: var(--tag-ct); }
  .expand-btn { background: none; border: 1.5px solid var(--border); border-radius: 6px; padding: 3px 8px; font-size: 11px; color: var(--muted); cursor: pointer; transition: all .15s; }
  .expand-btn:hover { border-color: var(--accent); color: var(--accent); }
  .detail-row td { background: #f8faff; padding: 0; }
  .detail-inner { padding: 10px 16px 12px; border-top: 1px dashed var(--border); }
  .detail-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .detail-table th { background: transparent; font-size: 10px; padding: 4px 8px; }
  .detail-table td { padding: 4px 8px; border-bottom: 1px solid var(--border); }
  .detail-table tr:last-child td { border-bottom: none; }
  .no-data { text-align: center; padding: 40px; color: var(--muted); }

  /* Stats panels */
  .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; padding: 0 16px 16px; }
  @media(max-width:600px){ .stats-grid { grid-template-columns: 1fr; } }
  .stat-card { background: var(--card); border-radius: 12px; padding: 16px; border: 1px solid var(--border); }
  .stat-card h3 { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 12px; }
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .bar-label { font-size: 12px; color: var(--ink2); min-width: 100px; max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 600; }
  .bar-track { flex: 1; height: 8px; background: var(--bg); border-radius: 4px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width .4s; }
  .bar-val { font-size: 12px; font-weight: 700; color: var(--ink); min-width: 70px; text-align: right; }
  .month-row { display: grid; grid-template-columns: 80px 1fr 80px; align-items: center; gap: 8px; margin-bottom: 8px; }

  /* Totals footer */
  .footer-total { display: flex; justify-content: flex-end; gap: 24px; padding: 12px 28px; background: #f0f3fa; border-top: 1px solid var(--border); font-size: 13px; }
  .footer-total span { color: var(--muted); }
  .footer-total strong { color: var(--ink); }

  .hidden { display: none !important; }
  .section { display: none; }
  .section.active { display: block; }
</style>
</head>
<body>

<div class="header">
  <div class="header-icon">📋</div>
  <div>
    <h1>請款管理系統</h1>
    <div class="header-sub">標線工程 · 請款統計管理</div>
  </div>
</div>

<div class="summary" id="summaryCards"></div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('list')">📄 請款明細</div>
  <div class="tab" onclick="switchTab('stats')">📊 統計分析</div>
</div>

<div id="listSection" class="section active">
  <div class="filters">
    <span class="filter-label">月份</span>
    <select class="filter-select" id="filterMonth" onchange="applyFilter()">
      <option value="">全部</option>
    </select>
    <span class="filter-label">開立公司</span>
    <select class="filter-select" id="filterCompany" onchange="applyFilter()">
      <option value="">全部</option>
      <option>信帆</option>
      <option>元上億</option>
      <option>優美佳</option>
    </select>
    <input class="filter-input" type="text" id="filterSearch" placeholder="🔍 搜尋廠商、地點..." oninput="applyFilter()">
    <span class="result-count" id="resultCount"></span>
  </div>
  <div class="table-wrap">
    <table id="mainTable">
      <thead>
        <tr>
          <th onclick="sortBy('月份')">月份 <span class="sort-icon">↕</span></th>
          <th onclick="sortBy('廠商')">廠商名稱 <span class="sort-icon">↕</span></th>
          <th>施工地點</th>
          <th>開立公司</th>
          <th onclick="sortBy('總金額')" style="text-align:right">總金額 <span class="sort-icon">↕</span></th>
          <th>發票號碼</th>
          <th>明細</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <div class="footer-total" id="footerTotal"></div>
</div>

<div id="statsSection" class="section">
  <div class="stats-grid" id="statsGrid"></div>
</div>

// Summary cards
function renderSummary(rows) {
  const total = rows.reduce((s,d) => s + d.總金額, 0);
  const vendors = new Set(rows.map(d => d.廠商)).size;
  const byCompany = {};
  rows.forEach(d => { byCompany[d.開立公司] = (byCompany[d.開立公司]||0) + d.總金額; });
  document.getElementById('summaryCards').innerHTML = `
    <div class="card"><div class="card-label">總請款金額</div><div class="card-value accent">${fmt(total)}</div><div class="card-sub">${rows.length} 筆請款單</div></div>
    <div class="card"><div class="card-label">廠商數量</div><div class="card-value">${vendors}</div><div class="card-sub">家廠商</div></div>
    <div class="card"><div class="card-label">信帆</div><div class="card-value green">${fmt(byCompany['信帆']||0)}</div><div class="card-sub">${rows.filter(d=>d.開立公司==='信帆').length} 筆</div></div>
    <div class="card"><div class="card-label">元上億 / 優美佳</div><div class="card-value" style="font-size:16px">${fmt((byCompany['元上億']||0)+(byCompany['優美佳']||0))}</div><div class="card-sub">${rows.filter(d=>d.開立公司!=='信帆').length} 筆</div></div>
  `;
}

// Table
function renderTable() {
  const tbody = document.getElementById('tableBody');
  if (!filtered.length) { tbody.innerHTML = '<tr><td colspan="7" class="no-data">無符合條件的資料</td></tr>'; return; }
  const total = filtered.reduce((s,d) => s + d.總金額, 0);
  document.getElementById('resultCount').textContent = `共 ${filtered.length} 筆`;
  document.getElementById('footerTotal').innerHTML = `<span>篩選合計：</span><strong>${fmt(total)}</strong>`;

  let html = '';
  filtered.forEach(d => {
    const exp = expandedRows.has(d._id);
    html += `<tr>
      <td class="col-month">${d.月份}</td>
      <td class="col-vendor">${d.廠商}</td>
      <td class="col-location">${d.施工地點.replace(/\n/g,'<br>')}</td>
      <td><span class="tag tag-${d.開立公司}">${d.開立公司}</span></td>
      <td class="col-amount">${fmt(d.總金額)}</td>
      <td class="col-invoice">${d.發票號碼||'—'}</td>
      <td><button class="expand-btn" onclick="toggleDetail(${d._id})">${exp ? '▲ 收起' : '▼ 明細'}</button></td>
    </tr>`;
    if (exp && d.明細.length) {
      html += `<tr class="detail-row"><td colspan="7"><div class="detail-inner">
        <table class="detail-table">
          <thead><tr><th>項目</th><th>單位</th><th style="text-align:right">數量</th><th style="text-align:right">單價</th><th style="text-align:right">金額</th></tr></thead>
          <tbody>${d.明細.map(m => `<tr><td>${m.項目}</td><td>${m.單位}</td><td style="text-align:right">${m.數量.toLocaleString()}</td><td style="text-align:right">${m.單價.toLocaleString()}</td><td style="text-align:right;font-weight:700">$${Math.round(m.金額).toLocaleString()}</td></tr>`).join('')}</tbody>
        </table></div></td></tr>`;
    }
  });
  tbody.innerHTML = html;
}

function toggleDetail(id) {
  if (expandedRows.has(id)) expandedRows.delete(id);
  else expandedRows.add(id);
  renderTable();
}

// Sort
function sortBy(col) {
  if (sortCol === col) sortDir *= -1;
  else { sortCol = col; sortDir = 1; }
  document.querySelectorAll('th').forEach(th => th.classList.remove('sorted'));
  filtered.sort((a,b) => {
    const av = a[col], bv = b[col];
    return typeof av === 'number' ? (av - bv) * sortDir : av.localeCompare(bv) * sortDir;
  });
  renderTable();
}

// Filter
function applyFilter() {
  const month = document.getElementById('filterMonth').value;
  const company = document.getElementById('filterCompany').value;
  const search = document.getElementById('filterSearch').value.toLowerCase();
  filtered = data.filter(d => {
    if (month && d.月份 !== month) return false;
    if (company && d.開立公司 !== company) return false;
    if (search && !d.廠商.includes(search) && !d.施工地點.toLowerCase().includes(search) && !d.發票號碼.toLowerCase().includes(search)) return false;
    return true;
  });
  renderSummary(filtered);
  renderTable();
  renderStats();
}

// Stats
function renderStats() {
  // By vendor
  const vendorMap = {};
  filtered.forEach(d => { vendorMap[d.廠商] = (vendorMap[d.廠商]||0) + d.總金額; });
  const topVendors = Object.entries(vendorMap).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const maxV = topVendors[0]?.[1] || 1;

  // By month
  const monthMap = {};
  filtered.forEach(d => { monthMap[d.月份] = (monthMap[d.月份]||0) + d.總金額; });
  const months = Object.entries(monthMap).sort((a,b)=>a[0].localeCompare(b[0]));
  const maxM = Math.max(...months.map(m=>m[1])) || 1;

  // By company
  const compMap = {};
  filtered.forEach(d => { compMap[d.開立公司] = (compMap[d.開立公司]||0) + d.總金額; });
  const compTotal = Object.values(compMap).reduce((s,v)=>s+v,0) || 1;

  // By item type
  const itemMap = {};
  filtered.forEach(d => d.明細.forEach(m => { itemMap[m.項目] = (itemMap[m.項目]||0) + m.金額; }));
  const topItems = Object.entries(itemMap).sort((a,b)=>b[1]-a[1]).slice(0,6);
  const maxI = topItems[0]?.[1] || 1;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card">
      <h3>各廠商請款金額 Top 8</h3>
      ${topVendors.map(([v,a])=>`<div class="bar-row"><div class="bar-label" title="${v}">${v}</div><div class="bar-track"><div class="bar-fill" style="width:${(a/maxV*100).toFixed(1)}%"></div></div><div class="bar-val">${fmt(a)}</div></div>`).join('')}
    </div>
    <div class="stat-card">
      <h3>各月份請款總額</h3>
      ${months.map(([m,a])=>`<div class="month-row"><div style="font-size:12px;font-weight:700;color:var(--ink2)">${m.replace('115年','')}</div><div class="bar-track"><div class="bar-fill" style="width:${(a/maxM*100).toFixed(1)}%;background:var(--green)"></div></div><div style="font-size:12px;font-weight:700;text-align:right">${fmt(a)}</div></div>`).join('')}
    </div>
    <div class="stat-card">
      <h3>開立公司佔比</h3>
      ${Object.entries(compMap).sort((a,b)=>b[1]-a[1]).map(([c,a])=>`
        <div class="bar-row">
          <div class="bar-label"><span class="tag tag-${c}">${c}</span></div>
          <div class="bar-track"><div class="bar-fill" style="width:${(a/compTotal*100).toFixed(1)}%;background:${c==='信帆'?'#2563eb':c==='元上億'?'#059669':'#d97706'}"></div></div>
          <div class="bar-val">${(a/compTotal*100).toFixed(1)}%</div>
        </div>
        <div style="font-size:11px;color:var(--muted);margin:-4px 0 8px 108px">${fmt(a)}</div>
      `).join('')}
    </div>
    <div class="stat-card">
      <h3>工項請款金額 Top 6</h3>
      ${topItems.map(([item,a])=>`<div class="bar-row"><div class="bar-label" title="${item}">${item}</div><div class="bar-track"><div class="bar-fill" style="width:${(a/maxI*100).toFixed(1)}%;background:#7c3aed"></div></div><div class="bar-val">${fmt(a)}</div></div>`).join('')}
    </div>
  `;
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (i===0&&tab==='list')||(i===1&&tab==='stats')));
  document.getElementById('listSection').classList.toggle('active', tab==='list');
  document.getElementById('statsSection').classList.toggle('active', tab==='stats');
}

// Init
initFilters();
renderSummary(data);
renderTable();
renderStats();
</script>
</body>
</html>
